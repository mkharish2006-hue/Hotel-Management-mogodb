<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="HotelHub Login — Secure access to your hotel management dashboard.">
    <title>HotelHub — Login</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏨</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ─── Reset ─── */
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --primary-dark: #4f46e5;
            --glow: rgba(99, 102, 241, 0.4);
            --bg-start: #0f0c29;
            --bg-mid: #1a1145;
            --bg-end: #24243e;
            --surface: rgba(255,255,255,0.05);
            --border: rgba(255,255,255,0.1);
            --text: #f1f5f9;
            --text-muted: #94a3b8;
            --danger: #f43f5e;
            --success: #10b981;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg-start), var(--bg-mid), var(--bg-end));
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text);
            overflow: hidden;
        }

        /* ─── Animated Background ─── */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: 0;
            animation: float 18s ease-in-out infinite;
        }

        .bg-orb.orb-1 {
            width: 500px; height: 500px;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            top: -150px; right: -100px;
        }

        .bg-orb.orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, #06b6d4 0%, transparent 70%);
            bottom: -100px; left: -100px;
            animation-delay: -9s;
        }

        .bg-orb.orb-3 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, #f43f5e 0%, transparent 70%);
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -5s;
            opacity: 0.15;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -20px) scale(1.05); }
            66% { transform: translate(-20px, 15px) scale(0.95); }
        }

        /* ─── Login Container ─── */
        .login-container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 440px;
            padding: 0 20px;
            animation: slideUp 0.6s ease;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* ─── Login Card ─── */
        .login-card {
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 48px 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
        }

        /* ─── Brand ─── */
        .brand {
            text-align: center;
            margin-bottom: 36px;
        }

        .brand-logo {
            width: 70px;
            height: 70px;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), #06b6d4);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 34px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 32px var(--glow);
            animation: pulse 3s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 8px 32px var(--glow); }
            50% { box-shadow: 0 8px 48px rgba(99, 102, 241, 0.6); }
        }

        .brand h1 {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--text), var(--primary-light));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand p {
            color: var(--text-muted);
            font-size: 0.88rem;
            margin-top: 4px;
        }

        /* ─── Form ─── */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            opacity: 0.5;
            pointer-events: none;
        }

        .form-group input {
            width: 100%;
            padding: 14px 16px 14px 48px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: rgba(148, 163, 184, 0.5);
        }

        .form-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px var(--glow);
            background: rgba(255, 255, 255, 0.08);
        }

        /* ─── Login Button ─── */
        .login-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border: none;
            border-radius: 12px;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px var(--glow);
            margin-top: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--glow);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .btn-spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ─── Error Message ─── */
        .error-msg {
            background: rgba(244, 63, 94, 0.1);
            border: 1px solid rgba(244, 63, 94, 0.3);
            border-radius: 10px;
            padding: 12px 16px;
            color: var(--danger);
            font-size: 0.88rem;
            font-weight: 500;
            text-align: center;
            margin-bottom: 20px;
            display: none;
            animation: shake 0.4s ease;
        }

        .error-msg.visible {
            display: block;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        /* ─── Credentials Hint ─── */
        .credentials-hint {
            margin-top: 24px;
            padding: 16px;
            background: rgba(99, 102, 241, 0.06);
            border: 1px dashed rgba(99, 102, 241, 0.25);
            border-radius: 12px;
            text-align: center;
        }

        .credentials-hint p {
            font-size: 0.78rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .credentials-hint .creds {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 8px;
        }

        .credentials-hint .cred-item {
            font-size: 0.82rem;
            color: var(--primary-light);
            font-weight: 600;
            background: rgba(99, 102, 241, 0.1);
            padding: 6px 14px;
            border-radius: 8px;
        }

        /* ─── Footer ─── */
        .login-footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.78rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>

    <!-- Animated background orbs -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- Brand -->
            <div class="brand">
                <div class="brand-logo">🏨</div>
                <h1>HotelHub</h1>
                <p>Hotel Management Suite</p>
            </div>

            <!-- Error Message -->
            <div id="errorMsg" class="error-msg"></div>

            <!-- Login Form -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <span class="input-icon">👤</span>
                        <input type="text" id="username" placeholder="Enter username" autocomplete="username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span id="btnText">Sign In</span>
                </button>
            </form>

            <!-- Credentials hint -->
            <div class="credentials-hint">
                <p>Demo Credentials</p>
                <div class="creds">
                    <span class="cred-item">admin / 1234</span>
                    <span class="cred-item">user / 1234</span>
                </div>
            </div>
        </div>

        <div class="login-footer">
            © 2026 HotelHub — Hotel Management System
        </div>
    </div>

    <script>
        async function handleLogin(e) {
            e.preventDefault();

            const btn = document.getElementById('loginBtn');
            const btnText = document.getElementById('btnText');
            const errorMsg = document.getElementById('errorMsg');
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            // Hide previous error
            errorMsg.classList.remove('visible');

            // Validate
            if (!username || !password) {
                showError('Please enter both username and password');
                return;
            }

            if (password.length < 4) {
                showError('Password must be at least 4 characters');
                return;
            }

            // Disable button
            btn.disabled = true;
            btnText.innerHTML = '<div class="btn-spinner"></div> Signing in...';

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json();

                if (res.ok) {
                    // Success — redirect to dashboard
                    document.querySelector('.login-card').style.transform = 'scale(0.95)';
                    document.querySelector('.login-card').style.opacity = '0';
                    setTimeout(() => {
                        window.location.href = '/';
                    }, 400);
                } else {
                    showError(data.error || 'Login failed');
                }
            } catch (err) {
                showError('Server error. Is MongoDB running?');
            } finally {
                btn.disabled = false;
                btnText.textContent = 'Sign In';
            }
        }

        function showError(msg) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = msg;
            errorMsg.classList.add('visible');
        }
    </script>

</body>
</html>
